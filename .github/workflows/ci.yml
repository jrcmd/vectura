name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (frontend + backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Install backend deps
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

  test:
    name: Test (backend + frontend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vectura
          POSTGRES_USER: vectura
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vectura" \
          --health-interval=10s \
          --health-timeout=5s \
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      # Valeurs de test (CI). Ajuste si tes tests en ont besoin.
      DATABASE_URL: postgresql://vectura:postgres@localhost:5432/vectura
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-please-change
      SMTP_HOST: localhost
      SMTP_PORT: 25
      SMTP_USER: ''
      SMTP_PASS: ''
      FROM_EMAIL: ci@example.com
      VITE_API_URL: http://localhost
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Test frontend (Vitest)
        working-directory: ./frontend
        run: npm run test

      - name: Install backend deps
        working-directory: ./backend
        run: npm ci

      - name: Test backend (Jest)
        working-directory: ./backend
        run: npm run test

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install backend deps
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

