version: '3.8'

services:
  # ============================================
  # POSTGRESQL — Base de données
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: vectura-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: vectura_staging
      POSTGRES_USER: ${DB_USER:-vectura}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./backups:/backups:rw
    networks:
      - vectura-network-staging
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vectura} -d vectura_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # REDIS — Cache & Sessions
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vectura-redis-staging
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    networks:
      - vectura-network-staging
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================
  # BACKEND — API Node.js/Express
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectura-backend-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=staging
    volumes:
      - uploads_staging:/app/uploads:rw
      - ./backups:/app/backups:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vectura-network-staging
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # FRONTEND — Application React
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vectura-frontend-staging
    restart: unless-stopped
    volumes:
      - uploads_staging:/app/uploads:rw
    depends_on:
      - backend
    networks:
      - vectura-network-staging

networks:
  vectura-network-staging:
    driver: bridge

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  uploads_staging:
    driver: local