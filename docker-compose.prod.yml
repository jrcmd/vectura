version: '3.8'

services:
  # ============================================
  # POSTGRESQL — Base de données
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: vectura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vectura_prod
      POSTGRES_USER: ${DB_USER:-vectura}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups:rw
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - vectura-network
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vectura} -d vectura_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # REDIS — Cache & Sessions
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vectura-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - vectura-network
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # BACKEND — API Node.js/Express
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: vectura-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    volumes:
      - uploads:/app/uploads:rw
      - ./backups:/app/backups:rw
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vectura-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # BACKUP — Service de sauvegarde automatique
  # ============================================
  backup:
    image: postgres:15-alpine
    container_name: vectura-backup
    restart: unless-stopped
    environment:
      - PGPASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER:-vectura}
      - DB_NAME=vectura_prod
      - BACKUP_DIR=/backups
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
    volumes:
      - ./backups:/backups:rw
      - ./scripts:/scripts:ro
    networks:
      - vectura-network
    depends_on:
      - postgres
    command: >
      sh -c "
        echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  vectura-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  backend_logs:
    driver: local