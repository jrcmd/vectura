services:
  postgres-prod:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vectura
      POSTGRES_USER: vectura
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - vectura-prod

  redis-prod:
    image: redis:7-alpine
    networks:
      - vectura-prod

  backend-prod:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://vectura:${DB_PASSWORD}@postgres-prod:5432/vectura
      REDIS_URL: redis://redis-prod:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      DOMAIN: ${DOMAIN}
      SSL_MODE: ${SSL_MODE:-external}
      API_BASE_URL: ${API_BASE_URL:-https://api.${DOMAIN}/api}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://${DOMAIN}}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      UPLOAD_DIR: /app/uploads
      INVOICE_DIR: /app/uploads/invoices
      BACKUP_DIR: /app/backups
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_USE_METADATA_ONLY: ${BACKUP_USE_METADATA_ONLY:-false}
      NODE_ENV: production
    depends_on:
      - postgres-prod
      - redis-prod
    volumes:
      - prod_uploads:/app/uploads
      - prod_backups:/app/backups
    networks:
      - vectura-prod
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend-prod:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://api.${DOMAIN}/api}
    depends_on:
      - backend-prod
    networks:
      - vectura-prod
    ports:
      - "${FRONTEND_PORT:-80}:4173"

volumes:
  postgres_prod_data:
  prod_uploads:
  prod_backups:

networks:
  vectura-prod:
